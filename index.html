<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdelhamid Nechniche | Prompt Library 1000</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0f1a;
            color: white;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            justify-content: center;
        }
        .prompt-card {
            background: #161e2d;
            border: 1px solid #2d3748;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: 0.3s ease;
            width: 200px;
            height: 280px;
            position: relative;
        }
        .prompt-card:hover {
            border-color: #38bdf8;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }
        .image-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            position: relative;
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* يضمن ظهور الصورة كاملة */
            transition: transform 0.4s ease-in-out;
            cursor: zoom-in;
        }
        /* تأثير التكبير عند تمرير الفأرة */
        .image-container:hover img {
            transform: scale(1.6); /* تكبير بنسبة 160% لرؤية التفاصيل */
            z-index: 20;
        }
        .filter-btn {
            padding: 8px 20px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid #2d3748;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-btn.active {
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <header class="max-w-7xl mx-auto text-center mb-12">
        <h1 class="text-3xl md:text-5xl font-extrabold text-white mb-4 uppercase tracking-tighter">
            ABDELHAMID <span class="text-sky-500 font-black">PROMPTS 1000</span>
        </h1>
        <p class="text-gray-400 text-sm italic">Bibliothèque officielle de Design & IA</p>
        <input
            type="text"
            id="searchInput"
            placeholder="Rechercher un prompt..."
            class="w-full max-w-md p-2 rounded-lg bg-gray-800 text-white border border-gray-600 focus:outline-none focus:border-sky-500 mt-4"
            oninput="searchPrompts()"
        />
    </header>

    <div class="max-w-7xl mx-auto mb-8">
        <div class="flex flex-wrap gap-2 justify-center mb-8">
            <button class="filter-btn active bg-slate-700 text-white" onclick="filterSelection('all', this)">Tout voir (الكل)</button>
                        <button class="filter-btn bg-purple-600 text-white" onclick="filterSelection('texte', this)">Texte (نصوص)</button>
                        <button class="filter-btn bg-emerald-700 text-white" onclick="filterSelection('pelerinage', this)">Pèlerinage (حج وعمرة)</button>
                        <button class="filter-btn bg-lime-600 text-white" onclick="filterSelection('religion', this)">Religion (ديني)</button>
                        <button class="filter-btn bg-blue-600 text-white" onclick="filterSelection('educatif', this)">Éducatif (تعليمي)</button>
                        <button class="filter-btn bg-cyan-600 text-white" onclick="filterSelection('occasion', this)">Occasion (مناسبة)</button>
            <button class="filter-btn bg-gray-600 text-white" onclick="filterSelection('non_classe', this)">Non-classé (غير مصنف)</button>
            <button class="filter-btn bg-yellow-600 text-white" onclick="filterSelection('portrait', this)">Portrait (بورتريه)</button>
            <button class="filter-btn bg-indigo-600 text-white" onclick="filterSelection('comique', this)">Comique (كوميدي)</button>
            <button class="filter-btn bg-rose-600 text-white" onclick="filterSelection('emploi', this)">Emploi (توظيف)</button>
                        <button class="filter-btn bg-orange-600 text-white" onclick="filterSelection('sport', this)">Sport (رياضة)</button>
                        <button class="filter-btn bg-emerald-600 text-white" onclick="filterSelection('voyage', this)">Voyage (سفر)</button>
                        <button class="filter-btn bg-blue-500 text-white" onclick="filterSelection('plage', this)">Plage (بحر)</button>
                        <button class="filter-btn bg-amber-800 text-white" onclick="filterSelection('luxe', this)">Luxe (رفاهية)</button>
            <button class="filter-btn bg-amber-600 text-white" onclick="filterSelection('animaux', this)">Animaux (حيوانات)</button>
            <button class="filter-btn bg-stone-600 text-white" onclick="filterSelection('restoration', this)">Restoration (ترميم)</button>
                        <button class="filter-btn bg-sky-600 text-white" onclick="filterSelection('femme', this)">Femme (مرأة)</button>
        </div>

        <div id="gallery" class="grid-container"></div>

        <div class="flex justify-center gap-2 mt-8">
            <button onclick="changePage('first')" class="filter-btn bg-slate-700 text-white">««</button>
            <button onclick="changePage('prev')" class="filter-btn bg-slate-700 text-white">«</button>
            <span id="pageInfo" class="filter-btn bg-slate-800 text-sky-400 border border-slate-600 cursor-default select-none">Page 1 / 1</span>
            <button onclick="changePage('next')" class="filter-btn bg-slate-700 text-white">»</button>
            <button onclick="changePage('last')" class="filter-btn bg-slate-700 text-white">»»</button>
        </div>
    </div>

    <script>
        let promptsData = [];
        let currentFilter = 'all';
        let currentPage = 1;
        let itemsPerPage = 50;
        let currentSearch = '';

        const categoryColors = {
            'femme': 'bg-sky-600', 'portrait': 'bg-yellow-600', 'occasion': 'bg-cyan-600',
            'texte': 'bg-purple-600', 'animaux': 'bg-amber-600', 'sport': 'bg-orange-600',
            'voyage': 'bg-emerald-600', 'emploi': 'bg-rose-600', 'comique': 'bg-indigo-600',
            'solution': 'bg-amber-600', 'enfants': 'bg-fuchsia-600', 'religion': 'bg-lime-600',
            'luxe': 'bg-amber-800', 'plage': 'bg-blue-500', 'pelerinage': 'bg-emerald-700',
            'educatif': 'bg-blue-600', 'non_classe': 'bg-gray-600', 'restoration': 'bg-stone-600'
        };

        async function loadPrompts() {
            try {
                const response = await fetch('prompts.json');
                if (!response.ok) throw new Error('Fichier prompts.json introuvable.');
                promptsData = await response.json();
                renderGallery();
            } catch (error) {
                console.error('Erreur :', error);
            }
        }

        function getFilteredData() {
            return promptsData.filter(prompt => {
                const matchesCategory = currentFilter === 'all' || prompt.category === currentFilter;
                const matchesSearch = prompt.text.toLowerCase().includes(currentSearch) ||
                                      (prompt.title && prompt.title.toLowerCase().includes(currentSearch)) ||
                                      prompt.category.toLowerCase().includes(currentSearch);
                return matchesCategory && matchesSearch;
            });
        }

        function checkImageExists(url, callback) {
            const img = new Image();
            img.onload = () => callback(true);
            img.onerror = () => callback(false);
            img.src = url;
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            const filteredData = getFilteredData();
            const totalPages = Math.ceil(filteredData.length / itemsPerPage) || 1;
            document.getElementById('pageInfo').textContent = `Page ${currentPage} / ${totalPages}`;
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedData = filteredData.slice(startIndex, endIndex);

            paginatedData.forEach(prompt => {
                const card = document.createElement('div');
                card.className = 'prompt-card';

                const imageContainer = document.createElement('div');
                imageContainer.className = 'image-container';

                const jpgUrl = `images/${prompt.id}.jpg`;
                const pngUrl = `images/${prompt.id}.png`;

                checkImageExists(jpgUrl, (exists) => {
                    let finalUrl = exists ? jpgUrl : pngUrl;
                    
                    const idBadge = `<span style="position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.65);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;z-index:10;letter-spacing:0.5px;line-height:1.5;pointer-events:none;">#${prompt.id}</span>`;
                    if (!exists) {
                        checkImageExists(pngUrl, (pngExists) => {
                            if (pngExists) {
                                imageContainer.innerHTML = `<img src="${pngUrl}" alt="Prompt ${prompt.id}">${idBadge}`;
                            } else {
                                imageContainer.innerHTML = `<div class="w-full h-full flex items-center justify-center text-gray-500 text-xs text-center p-2">Pas d'image</div>${idBadge}`;
                            }
                        });
                    } else {
                        imageContainer.innerHTML = `<img src="${jpgUrl}" alt="Prompt ${prompt.id}">${idBadge}`;
                    }
                    card.appendChild(imageContainer);

                    const displayTitle = prompt.title || (prompt.text.split(' ').slice(0, 5).join(' ') + '...');
                    const textContainer = document.createElement('div');
                    textContainer.className = 'p-3 flex-1 overflow-hidden';
                    textContainer.innerHTML = `
                        <h3 class="font-bold text-[10px] mb-1 truncate text-sky-400 uppercase">${displayTitle}</h3>
                        <p class="text-gray-400 text-[9px] line-clamp-2 leading-tight">${prompt.text.substring(0, 80)}...</p>
                    `;
                    card.appendChild(textContainer);

                    const btnColor = categoryColors[prompt.category] || 'bg-sky-600';
                    const button = document.createElement('button');
                    button.onclick = () => copyById(prompt.id);
                    button.id = `btn-${prompt.id}`;
                    button.className = `w-full ${btnColor} hover:brightness-110 py-1.5 rounded-b-lg text-xs font-bold text-white uppercase transition-all z-30 flex items-center justify-center gap-1`;
                    button.innerHTML = `COPIER <span style="font-size:10px; opacity:0.65; font-weight:400; text-transform:none;">#${prompt.id}</span>`;
                    card.appendChild(button);

                    gallery.appendChild(card);
                });
            });
        }

        function changePage(action) {
            const filteredData = getFilteredData();
            const totalPages = Math.ceil(filteredData.length / itemsPerPage) || 1;
            if (action === 'next' && currentPage < totalPages) currentPage++;
            else if (action === 'prev' && currentPage > 1) currentPage--;
            else if (action === 'first') currentPage = 1;
            else if (action === 'last') currentPage = totalPages;
            renderGallery();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterSelection(category, btn) {
            currentFilter = category;
            currentPage = 1;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGallery();
        }

        function searchPrompts() {
            currentSearch = document.getElementById('searchInput').value.toLowerCase();
            currentPage = 1;
            renderGallery();
        }

        function copyById(id) {
            const prompt = promptsData.find(p => p.id === id);
            if (!prompt) return;
            navigator.clipboard.writeText(prompt.text).then(() => {
                const btn = document.getElementById(`btn-${id}`);
                const oldHTML = btn.innerHTML;
                btn.innerText = "COPIÉ !";
                btn.style.filter = "brightness(1.5)";
                setTimeout(() => {
                    btn.innerHTML = oldHTML;
                    btn.style.filter = "none";
                }, 2000);
            });
        }

        window.onload = loadPrompts;
    </script>
</body>
</html>
